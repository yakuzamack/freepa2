server {
    listen 3001;
    server_name localhost 127.0.0.1 _;

    # Trust upstream (Docker bridge, Traefik, Cloudflare) for real client IP
    set_real_ip_from 0.0.0.0/0;  # Trust all - headers from Traefik/Cloudflare

    # Use X-Forwarded-For (populated by Traefik and Cloudflare)
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /var/www/html;
    index index.html index.htm index.php;

    location / {
        try_files $uri $uri/ @app;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Pass real client IP to PHP
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_cf_connecting_ip;
        fastcgi_param HTTP_CF_PSEUDO_IPV4 $http_cf_pseudo_ipv4;
        fastcgi_param HTTP_CF_RAY $http_cf_ray;
        fastcgi_param HTTP_CF_COUNTRY $http_cf_country;

        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_pass 127.0.0.1:9000;
    }

    location @app {
        rewrite ^ /index.php?$query_string last;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
